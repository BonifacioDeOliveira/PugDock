name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
          # Ubuntu build disabled until tested on Linux; re-enable when ready:
          # - platform: ubuntu-22.04
          #   args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev build-essential curl wget file

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Builds, signs updater artifacts, creates/updates the GitHub Release
      # for the pushed tag, and uploads bundles + latest.json.
      - id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          PUGDOCK_GITHUB_CLIENT_ID: ${{ secrets.PUGDOCK_GITHUB_CLIENT_ID }}
          PUGDOCK_GITHUB_CLIENT_SECRET: ${{ secrets.PUGDOCK_GITHUB_CLIENT_SECRET }}
          PUGDOCK_UPDATE_REPO: ${{ github.repository }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PugDock ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      # Human-friendly installer names: AppleSilicon / AppleIntel instead of
      # aarch64 / x64. Only .dmg files are renamed; the updater artifacts and
      # latest.json keep their canonical names so in-app updates never break.
      - name: Friendly installer names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"             --jq '.assets[] | select(.name | endswith(".dmg")) | [.id, .name] | @tsv' |
          while IFS=$'\t' read -r id name; do
            new=$(echo "$name" | sed -e 's/aarch64/AppleSilicon/' -e 's/x64/AppleIntel/')
            if [ "$new" != "$name" ]; then
              gh api -X PATCH "/repos/${{ github.repository }}/releases/assets/$id" -f name="$new" > /dev/null
              echo "renamed: $name -> $new"
            fi
          done
